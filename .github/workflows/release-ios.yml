name: iOS Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  lint-test:
    uses: ./.github/workflows/lint-test.yml
    secrets: inherit

  app-store:
    runs-on: macos-26
    needs: lint-test
    env:
      VITE_ONESIGNAL_APP_ID: ${{ vars.ONESIGNAL_APP_ID || secrets.ONESIGNAL_APP_ID }}
      AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
      AWS_REGION: ${{ vars.AWS_REGION || secrets.AWS_REGION || 'eu-north-1' }}
      BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID || secrets.BEDROCK_MODEL_ID || 'anthropic.claude-sonnet-4-6' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Show Xcode version
        run: xcodebuild -version
      - run: npm ci
      - run: npm run build
      - run: npx capacitor sync ios
      - name: Generate App Store release notes
        run: node scripts/generate-release-notes.mjs
      - run: bundle exec fastlane ios app_store_release
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
      - name: Clean signing material
        if: always()
        run: |
          rm -rf build/ios/signing
          security delete-keychain build.keychain-db 2>/dev/null || true
          security delete-keychain build.keychain 2>/dev/null || true
